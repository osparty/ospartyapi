name: Deploy API

# Versioned, tag-driven GHCR deploys. Pushing a semver tag (e.g. v1.2.3) builds the image, pushes it to
# ghcr.io/osparty/osparty-api, then logs in + pulls + restarts the prod stack on the server. A
# workflow_dispatch run deploys on demand (versioned <gradle version>-<sha> unless you pass a version).
#
# Required repository secrets:
#   API_SERVER_ADDRESS  - server host/IP to SSH into
#   SSH_USER            - SSH user (must be able to run docker / docker compose)
#   SSH_KEY             - private SSH key for that user (PEM, no passphrase)
#   GHCR_USERNAME       - GitHub username for the server's GHCR pull login
#   GHCR_TOKEN          - PAT with read:packages for that user (internal package)
# Optional:
#   SSH_PORT            - SSH port (defaults to 22)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for a manual deploy (default: <gradle version>-<sha>)'
        required: false

permissions:
  contents: write   # create the GitHub release
  packages: write   # push the image to GHCR

# Never run two deploys at once.
concurrency:
  group: deploy-api
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/osparty/osparty-api
  DEPLOY_DIR: osparty-api      # directory on the server, under the SSH user's home

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            BASE=$(sed -nE "s/.*findProperty\('appVersion'\) \?: '([^']+)'.*/\1/p" build.gradle | head -1)
            VERSION="${BASE:-0.0.0}-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying version: $VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build and test
        run: ./gradlew --no-daemon clean test bootJar -PappVersion=${{ steps.version.outputs.version }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest

      - name: Copy compose + monitoring to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.API_SERVER_ADDRESS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          # The image ships via GHCR; only the compose file + the prometheus/grafana config it mounts
          # need to reach the server.
          source: "docker-compose.yml,monitoring/**"
          target: ${{ env.DEPLOY_DIR }}
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ steps.version.outputs.version }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.API_SERVER_ADDRESS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: IMAGE_TAG,DEPLOY_DIR,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd "$DEPLOY_DIR"

            # Authenticate to GHCR (internal package) so the api pull works, incl. on a fresh node.
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            # Pull the exact api version (read by docker-compose.yml as IMAGE_TAG) and (re)start. Redis
            # and the proxy keep running; compose recreates only what changed. Rollback = redeploy an
            # older tag: IMAGE_TAG=<old> docker compose up -d
            export IMAGE_TAG
            docker compose pull
            docker compose up -d

            docker image prune -f >/dev/null 2>&1 || true
            echo "Deployed osparty-api ${IMAGE_TAG}"

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: build/libs/app.jar
