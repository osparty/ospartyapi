# blackbox-exporter probe modules. http_2xx does a plain GET and passes on a 200 — used by Prometheus to
# probe each instance's actuator /health endpoint (200 = UP; actuator returns 503 if a health indicator
# like Redis is DOWN, so this is a real health signal, not just "the port answered").
modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_status_codes: [200]
      preferred_ip_protocol: ip4
