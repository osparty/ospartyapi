# OSParty API load-balancing upstream for Nginx Proxy Manager.
#
# DO NOT hand-edit for node membership: the deploy workflow REGENERATES this file on the MAIN leg from the
# NODE_*_ADDRESS secrets (a node is included once its address secret is set), scp's it, and reloads nginx.
# So nodes join/leave the pool automatically as you add/remove their secret — never per push.
#
# nginx passive health checks (max_fails/fail_timeout) + proxy_next_upstream handle a node that's briefly
# down during its own rolling deploy, so `down` markers are not used. This committed version is the
# MAIN-only default (local reference / first bring-up before any node secret is set).
#
# Private IPs: MAIN 10.0.0.2 · node-1 10.0.0.3 · node-2 10.0.0.4. Each api binds :8080 to its private IP.

upstream osparty_api {
    least_conn;                                          # spread by active conns (good for long-lived WS)
    server 10.0.0.2:8080 max_fails=3 fail_timeout=15s;   # MAIN (api #1)
    keepalive 32;
}
