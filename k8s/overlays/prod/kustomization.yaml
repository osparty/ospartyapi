apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: osparty
resources:
  - namespace.yaml
  - ../../base
images:
  - name: ghcr.io/osparty/osparty-api
    newTag: latest
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: osparty-api
      spec:
        template:
          spec:
            containers:
              - name: api
                env:
                  - name: DISCORD_SERVICE_URL
                    value: http://osparty-discord:8090
