apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - api-deployment.yaml
  - api-service.yaml
  - redis.yaml
  - ingress.yaml
  - servicemonitors.yaml

# The OSParty API Grafana dashboard, picked up by kube-prometheus-stack's dashboard sidecar via the
# grafana_dashboard label. NOTE: the JSON is copied as-is from monitoring/grafana/dashboards/ and its
# queries still use the old compose-era labels (node=main|node-1|node-2, per-host cadvisor jobs) — panels
# keyed on those need reworking to k8s labels (pod/instance). Tracked as a post-cutover follow-up.
configMapGenerator:
  - name: grafana-dashboard-osparty-api
    files:
      - dashboards/osparty-api.json
    options:
      labels:
        grafana_dashboard: "1"

generatorOptions:
  disableNameSuffixHash: true
