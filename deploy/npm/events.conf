# Raise nginx's per-worker connection cap for the WebSocket firehose. nginx's default is 512, and each
# PROXIED WebSocket consumes TWO slots (client-side + upstream-side). At 200000 per worker x N workers / 2
# the client ceiling is enormous — the real limits become ephemeral ports to the upstream and RAM, not
# this. Included at the end of NPM's events{} block.
#
# Two things this relies on (both satisfied in docker-compose.main.yml):
#   - the container nofile ulimit (1048576) must stay >= worker_connections, or nginx caps at the lower one;
#   - nginx preallocates the per-worker connection array (~0.5KB/conn), so 200000 x workers reserves a few
#     hundred MB up front — fine on the 16GB MAIN box, but that's why you don't set this absurdly high.
worker_connections 200000;
