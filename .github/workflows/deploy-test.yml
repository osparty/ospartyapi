name: Deploy API (test)

# Continuous test deploy: every push to main (and on-demand via the Run workflow button) builds the
# image, pushes it to ghcr.io/osparty/osparty-api (tagged :test-<sha> + :test), then pulls + restarts
# the test stack at testing.osparty.net. Production stays tag-driven (see deploy.yml) and is untouched —
# this runs a separate stack/Redis/port on the same server, off the :test image tag.
#
# Uses the same repository secrets as the prod deploy:
#   API_SERVER_ADDRESS  - server host/IP to SSH into
#   SSH_USER            - SSH user (must be able to run docker / docker compose)
#   SSH_KEY             - private SSH key for that user (PEM, no passphrase)
#   GHCR_USERNAME       - GitHub username for the server's GHCR pull login
#   GHCR_TOKEN          - PAT with read:packages for that user (internal package)
# Optional:
#   SSH_PORT            - SSH port (defaults to 22)
# Auto test-deploy on push to main is DISABLED for now — this only runs when triggered manually from the
# Actions tab. Re-enable by restoring the `push: branches: [main]` trigger below.
on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

permissions:
  packages: write   # push the image to GHCR

# Don't run two test deploys at once, but never block a prod deploy.
concurrency:
  group: deploy-api-test
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/osparty/osparty-api
  DEPLOY_DIR: osparty-api-test   # directory on the server, under the SSH user's home

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          BASE=$(sed -nE "s/.*findProperty\('appVersion'\) \?: '([^']+)'.*/\1/p" build.gradle | head -1)
          VERSION="${BASE:-0.0.0}-test-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying test version: $VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build and test
        run: ./gradlew --no-daemon clean test bootJar -PappVersion=${{ steps.version.outputs.version }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # A moving :test tag the test compose defaults to, plus the immutable per-commit tag.
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:test

      - name: Copy compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.API_SERVER_ADDRESS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          # Only the test stack's compose file; the image ships via GHCR.
          source: "osparty-api-test/docker-compose.yml"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 1
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ steps.version.outputs.version }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.API_SERVER_ADDRESS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: IMAGE_TAG,DEPLOY_DIR,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd "$DEPLOY_DIR"

            # Authenticate to GHCR (internal package) so the pull works, incl. on a fresh node.
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            # Pull this commit's image (read by docker-compose.yml as IMAGE_TAG) and (re)start. The test
            # redis/volume keep running; compose recreates only what changed.
            export IMAGE_TAG
            docker compose pull
            docker compose up -d

            docker image prune -f >/dev/null 2>&1 || true
            echo "Deployed osparty-api-test ${IMAGE_TAG}"
