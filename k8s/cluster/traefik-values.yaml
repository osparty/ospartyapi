deployment:
  replicas: 1
  dnsPolicy: ClusterFirstWithHostNet
nodeSelector:
  osparty.net/ingress: "true"
hostNetwork: true
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
securityContext:
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
  readOnlyRootFilesystem: true
ports:
  traefik:
    port: 9000
  metrics:
    port: 9101
  web:
    port: 80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
    transport:
      respondingTimeouts:
        readTimeout: 0
  websecure:
    port: 443
    transport:
      respondingTimeouts:
        readTimeout: 0
service:
  enabled: false
ingressClass:
  enabled: true
  isDefaultClass: true
providers:
  kubernetesIngress:
    enabled: true
resources:
  requests:
    cpu: 250m
    memory: 256Mi
