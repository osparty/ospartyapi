# PROD — MAIN server (16GB/8vCPU). Runs the shared infrastructure plus one API instance:
#   redis (shared bus, private-net only) · prometheus · grafana · redis-exporter · api #1
# NPM (ingress/TLS) and the discord-bot run as their own stacks on this same box.
# The two 4GB nodes run docker-compose.node.yml (api only) and point at this box's private IP.
#
# Requires a .env next to this file with at least: REDIS_PASSWORD, MAIN_PRIVATE_IP, DISCORD_INTERNAL_TOKEN,
# GRAFANA_ADMIN_PASSWORD (see .env.main.example). IMAGE_TAG is exported by the deploy workflow.
services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      # redis-cli picks this up so the healthcheck can AUTH without putting the password on the cmdline.
      REDISCLI_AUTH: "${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    # Published ONLY on the private network so the remote API nodes can reach it; never public. api #1 on
    # this box reaches it by the compose service name `redis`, not this published port.
    ports:
      - target: 6379
        published: 6379
        host_ip: "${MAIN_PRIVATE_IP}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/osparty/osparty-api:${IMAGE_TAG:-latest}
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      # Voice provisioning -> the discord-bot stack on this box (published on the private IP:8090).
      DISCORD_SERVICE_URL: "http://${MAIN_PRIVATE_IP}:8090"
      DISCORD_INTERNAL_TOKEN: "${DISCORD_INTERNAL_TOKEN:-}"
      # OAuth2 account linking (blank = disabled). Nodes carry the same values (any node can serve the callback).
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID:-}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET:-}"
      DISCORD_REDIRECT_URI: "${DISCORD_REDIRECT_URI:-}"
    ports:
      # Bind to the private IP only — NPM (on this host) load-balances to it at 10.0.0.2:8080 over the
      # private net, uniform with the worker nodes. Nothing but NPM's 443 (+ SSH) is public.
      - target: 8080
        published: 8080
        host_ip: "${MAIN_PRIVATE_IP}"
    # Actuator/Prometheus metrics — reachable only on the compose network (prometheus scrapes api:9090).
    expose:
      - "9090"
    # Each WebSocket client is a file descriptor; the default container limit (often 1024) caps throughput
    # long before the app's max-connections: 20000. Raise it so the API can actually hold many sockets.
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    sysctls:
      # Bigger accept backlog for connection/reconnect bursts (pairs with Tomcat's accept-count).
      net.core.somaxconn: "65535"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    depends_on:
      - api
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    depends_on:
      - redis
    restart: unless-stopped

  # Host metrics (CPU, memory, disk, network, load) for THIS server. Prometheus scrapes it by service
  # name over the compose network. Reads real host stats via the / and host-PID mounts.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    pid: host
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped

  # Per-container metrics (CPU, memory, running state) for every container on this host — including ones
  # with no metrics endpoint of their own (npm, grafana, redis). This is how NPM shows up in the dashboard.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    command:
      - '--housekeeping_interval=15s'
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped

  # Synthetic HTTP probe: Prometheus hits /probe with a public URL and blackbox reports up/latency/cert
  # expiry. Probing https://api.osparty.net gives a TRUE end-to-end healthcheck THROUGH NPM + TLS + the LB.
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    # api.osparty.net resolves to MAIN's PUBLIC IP; a container can't reach its own host's public IP
    # (no NAT hairpin). Map the hostname to the docker host gateway so the probe hits NPM's 443 locally —
    # NPM still matches the SNI (api.osparty.net), serves the real LE cert, and routes through the LB.
    extra_hosts:
      - "api.osparty.net:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-https://monitoring.osparty.net}"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_HTTP_PORT:-3001}:3000"
    restart: unless-stopped

  # ---- Ingress / TLS / API load balancer -------------------------------------------------------
  # NPM terminates TLS for api.osparty.net + monitoring.osparty.net and load-balances the API across the
  # fleet via `upstream osparty_api` (deploy/npm/http_top.conf, mounted below and reloaded by the deploy).
  # Proxy Hosts + Let's Encrypt certs are a ONE-TIME UI setup, persisted in the npm-* volumes — the deploy
  # can't declare those. See deploy/README.md.
  npm:
    image: jc21/nginx-proxy-manager:2.12.1
    ports:
      - "80:80"     # HTTP — Let's Encrypt challenges + http->https redirects
      - "443:443"   # HTTPS — public ingress
      - "81:81"     # Admin UI — restrict to your IP via the Hetzner firewall
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
      # Custom nginx includes, version-controlled and shipped with the deploy. NOT :ro — NPM's startup
      # chowns everything under /data, and a read-only mount makes that fail and the container never boots.
      - ./deploy/npm/http_top.conf:/data/nginx/custom/http_top.conf   # the LB upstream
      - ./deploy/npm/events.conf:/data/nginx/custom/events.conf       # raises worker_connections
    # nginx needs a high fd ceiling to hold many proxied WebSockets (2 fds each). Must be >= what
    # worker_connections implies, or nginx caps at the lower of the two.
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    sysctls:
      # Each proxied WebSocket is a dedicated NPM->upstream connection using an ephemeral SOURCE port, so
      # the source-port range caps concurrent connections PER upstream. Widen it (~28k -> ~64k) and reuse
      # TIME_WAIT ports faster during reconnect storms. Namespaced sysctls, applied to this container.
      net.ipv4.ip_local_port_range: "1024 65535"
      net.ipv4.tcp_tw_reuse: "1"
      net.core.somaxconn: "65535"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  npm-data:
  npm-letsencrypt:
