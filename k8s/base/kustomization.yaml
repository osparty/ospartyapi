apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - api-deployment.yaml
  - api-service.yaml
  - redis.yaml
  - ingress.yaml
  - servicemonitors.yaml
configMapGenerator:
  - name: grafana-dashboard-osparty-api
    files:
      - dashboards/osparty-api.json
    options:
      labels:
        grafana_dashboard: "1"
generatorOptions:
  disableNameSuffixHash: true
