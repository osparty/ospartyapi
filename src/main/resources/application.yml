server:
  port: 8080

spring:
  application:
    name: osrs-party-api
  jackson:
    default-property-inclusion: always
  data:
    redis:
      host: localhost
      port: 6379
      # password: ...

app:
  rate-limit:
    # Minimum gap between POSTs from one client IP (ms). 0 disables.
    interval-ms: 5000
  ads:
    # Ad TTL (ms): an ad is reaped if its host stops keeping it alive within this
    # window. The open WebSocket refreshes it (see app.ws.touch-interval-ms); the
    # legacy REST heartbeat does too. Redis evicts it natively when the TTL lapses.
    ttl-ms: 90000
  ws:
    # Live party-list push over WebSocket (/api/v1/ws/parties). false disables the
    # socket endpoint and the reconciler; clients then fall back to REST polling.
    enabled: true
    # How often the server diffs the ad set and pushes changes to subscribers (ms).
    # This is the worst-case latency for a new/updated/removed party to reach clients.
    reconcile-interval-ms: 5000
    # How often a hosting socket refreshes its ad's TTL (socket-as-heartbeat). Must be
    # comfortably below app.ads.ttl-ms; the gap between them is the disconnect grace.
    touch-interval-ms: 5000

logging:
  level:
    # One INFO line per request (method, path, IP, status, latency).
    net.osparty.api.requests: INFO
    # Flip to DEBUG to also log request bodies (the PartyRequest JSON):
    # net.osparty.api.requests: DEBUG
    # WebSocket: connect/subscribe/close log at INFO; flip to DEBUG to log every
    # frame pushed on each live connection (the full snapshot/delta JSON):
    # net.osparty.api.web.PartyBroadcaster: DEBUG
