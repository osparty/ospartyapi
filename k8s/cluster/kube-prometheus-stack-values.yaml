alertmanager:
  enabled: false
prometheus:
  prometheusSpec:
    retention: 15d
    nodeSelector:
      osparty.net/role: main
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
grafana:
  nodeSelector:
    osparty.net/role: main
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  envFromSecret: grafana-env
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki:3100
  alerting:
    contactpoints.yaml:
      apiVersion: 1
      contactPoints:
        - orgId: 1
          name: discord
          receivers:
            - uid: discord
              type: discord
              settings:
                url: ${DISCORD_ALERT_WEBHOOK_URL}
                use_discord_username: true
                message: |-
                  {{ `{{ range .Alerts.Firing }}🔥 **{{ .Labels.alertname }}**{{ if .Annotations.summary }} — {{ .Annotations.summary }}{{ end }}
                  {{ if .Annotations.description }}{{ .Annotations.description }}
                  {{ end }}{{ end }}{{ range .Alerts.Resolved }}✅ **Resolved:** {{ .Labels.alertname }}
                  {{ end }}` }}
    policies.yaml:
      apiVersion: 1
      policies:
        - orgId: 1
          receiver: discord
          group_by: ['alertname']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
  grafana.ini:
    server:
      root_url: https://monitoring.osparty.net
    users:
      allow_sign_up: false
  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
    hosts:
      - monitoring.osparty.net
    tls:
      - hosts:
          - monitoring.osparty.net
        secretName: monitoring-tls
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
prometheusOperator:
  nodeSelector:
    osparty.net/role: main
kube-state-metrics:
  nodeSelector:
    osparty.net/role: main
