name: osparty-api-test

services:
  redis:
    image: redis:7-alpine
    container_name: osparty-redis-test
    command: ["redis-server", "--appendonly", "yes"]   # durable across restarts
    volumes:
      - redis-test-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    # Built + pushed to GHCR by deploy-test.yml (tag :test); the server pulls it (see IMAGE_TAG).
    image: ghcr.io/osparty/osparty-api:${IMAGE_TAG:-test}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osparty-api-test
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      # Voice-channel provisioning delegates to the separate osparty-discord service. Blank = voice off
      # (a no-op VoiceChannelService stands in). Point at a bot + set the matching secret to enable it.
      DISCORD_SERVICE_URL: "${DISCORD_SERVICE_URL:-}"
      DISCORD_INTERNAL_TOKEN: "${DISCORD_INTERNAL_TOKEN:-}"
      # OAuth2 account linking stays in the API (blank = linking disabled).
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID:-}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET:-}"
      DISCORD_REDIRECT_URI: "${DISCORD_REDIRECT_URI:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8081:8080"
    restart: unless-stopped

volumes:
  redis-test-data:
