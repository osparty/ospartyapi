# Loads any dashboard JSON dropped into /var/lib/grafana/dashboards (mounted from
# monitoring/grafana/dashboards) on startup.
apiVersion: 1

providers:
  - name: osparty
    orgId: 1
    folder: OSParty
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
