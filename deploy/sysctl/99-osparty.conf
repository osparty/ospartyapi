# Host-level network tuning for OSParty servers (apply on MAIN + every node). These are HOST-GLOBAL
# sysctls (not per-network-namespace), so they can't live in the compose `sysctls:` block — they must be
# set on the host. Install:
#     sudo cp deploy/sysctl/99-osparty.conf /etc/sysctl.d/99-osparty.conf
#     sudo sysctl --system
#
# The per-container namespaced sysctls (ip_local_port_range, tcp_tw_reuse, per-service somaxconn) are set
# in the compose files; these are the ones that only exist at host scope.

# Connection tracking table. The docker bridge / published-port DNAT tracks every connection; the default
# (often 262144 or less) fills under tens of thousands of sockets and the kernel starts DROPPING packets
# ("nf_conntrack: table full"). Size it well above your target concurrent connections.
net.netfilter.nf_conntrack_max = 1048576

# System-wide open-file ceiling (the per-container nofile ulimits can't exceed what the host allows).
fs.file-max = 2097152

# Accept/SYN backlog for connection + reconnect-storm bursts (host-scope defaults; the containers also set
# their own namespaced somaxconn).
net.core.somaxconn = 65535
net.ipv4.tcp_max_syn_backlog = 65535
net.core.netdev_max_backlog = 65535
