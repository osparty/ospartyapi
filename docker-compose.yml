services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]   # durable across restarts
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      # Discord voice-channel bot. Values come from a .env file placed next to this compose file
      # on the server (Compose substitutes ${...} from it). Defaults mirror application.yml, so if
      # .env is absent the bot stays off and the app runs exactly as before.
      DISCORD_ENABLED: "${DISCORD_ENABLED:-false}"
      DISCORD_TOKEN: "${DISCORD_TOKEN:-}"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID:-0}"
      DISCORD_CATEGORY_ID: "${DISCORD_CATEGORY_ID:-0}"
      DISCORD_INVITE_MAX_AGE_SECONDS: "${DISCORD_INVITE_MAX_AGE_SECONDS:-86400}"
      DISCORD_INVITE_MAX_USES: "${DISCORD_INVITE_MAX_USES:-0}"
      # OAuth2 account linking (blank = linking disabled).
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID:-}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET:-}"
      DISCORD_REDIRECT_URI: "${DISCORD_REDIRECT_URI:-}"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  redis-data:
