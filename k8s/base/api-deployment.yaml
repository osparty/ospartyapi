apiVersion: apps/v1
kind: Deployment
metadata:
  name: osparty-api
  labels:
    app: osparty-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: osparty-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: osparty-api
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          matchLabelKeys:
            - pod-template-hash
          labelSelector:
            matchLabels:
              app: osparty-api
      securityContext:
        sysctls:
          - name: net.core.somaxconn
            value: "65535"
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: api
          image: ghcr.io/osparty/osparty-api:latest
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9090
          env:
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=50.0"
            - name: DISCORD_SERVICE_URL
              value: ""
          envFrom:
            - secretRef:
                name: osparty-api-env
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              memory: 2Gi
