# OSParty API load-balancing upstream for Nginx Proxy Manager.
#
# NPM has no LB UI, so we define the backend pool here. NPM auto-includes files under
# /data/nginx/custom/ — mount this file there by adding a volume to the NPM stack's compose:
#     volumes:
#       - ./npm-custom:/data/nginx/custom:ro
# and drop this file in as ./npm-custom/http_top.conf (it's included at the top of the http{} block,
# the only place an upstream{} is valid). Then point the api.osparty.net Proxy Host at it via the
# Advanced tab (see api-proxy-host-advanced.conf). Validate: docker exec <npm> nginx -t && reload.
#
# Private IPs: MAIN 10.0.0.2 · node-1 10.0.0.3 · node-2 10.0.0.4. Each api binds :8080 to its private IP.

upstream osparty_api {
    least_conn;                                        # spread by active conns (good for long-lived WS)
    server 10.0.0.2:8080 max_fails=3 fail_timeout=15s; # MAIN  (api #1)
    server 10.0.0.3:8080 max_fails=3 fail_timeout=15s; # node-1
    server 10.0.0.4:8080 max_fails=3 fail_timeout=15s; # node-2
    keepalive 32;
}
