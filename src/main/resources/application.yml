server:
  port: 8080
  tomcat:
    max-connections: 20000
    accept-count: 2000
    threads:
      max: 800
      min-spare: 50

spring:
  application:
    name: osrs-party-api
  jackson:
    default-property-inclusion: always
  data:
    redis:
      host: localhost
      port: 6379

app:
  ads:
    ttl-ms: 90000
    # Parties older than this are purged outright, even with a live host heartbeat.
    stale-purge-age-ms: 7200000
    stale-purge-cron: "0 */5 * * * *"
  ws:
    enabled: true
    reconcile-interval-ms: 5000
    touch-interval-ms: 5000
  discord:
    service-url: ${DISCORD_SERVICE_URL:}
    internal-token: ${DISCORD_INTERNAL_TOKEN:}
    oauth:
      client-id: ${DISCORD_CLIENT_ID:}
      client-secret: ${DISCORD_CLIENT_SECRET:}
      redirect-uri: ${DISCORD_REDIRECT_URI:}

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    net.osparty.api.requests: INFO
