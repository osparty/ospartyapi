name: Deploy API (Kubernetes)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version (e.g. 1.1.0 for a minor bump, or an old version to redeploy). Empty = auto patch bump.'
        required: false
permissions:
  contents: write
  packages: write
concurrency:
  group: deploy-api-k8s
  cancel-in-progress: false
env:
  IMAGE: ghcr.io/osparty/osparty-api
  DEPLOY_DIR: osparty-api
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version (auto patch bump)
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Using explicit version: $VERSION"
          else
            LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="1.0.0"
              echo "No version tags yet — starting at $VERSION"
            else
              VERSION=$(echo "${LATEST#v}" | awk -F. '{printf "%d.%d.%d", $1, $2, $3 + 1}')
              echo "Latest tag $LATEST -> bumping patch to $VERSION"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Build and test
        run: ./gradlew --no-daemon clean test bootJar -PappVersion=${{ steps.version.outputs.version }}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Render manifests (prod overlay, image pinned to this version)
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          cd k8s/overlays/prod
          kustomize edit set image ${IMAGE}=${IMAGE}:${VERSION}
          kustomize build . -o "${GITHUB_WORKSPACE}/k8s-prod.yaml"
          echo "Rendered image refs:"; grep 'image:' "${GITHUB_WORKSPACE}/k8s-prod.yaml"

      - name: Copy rendered manifests to api01
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.API_SERVER_ADDRESS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: k8s-prod.yaml
          target: ${{ env.DEPLOY_DIR }}
          overwrite: true
      - name: Apply + wait for rollout
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          VERSION: ${{ needs.build.outputs.version }}
        with:
          host: ${{ secrets.API_SERVER_ADDRESS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: DEPLOY_DIR,VERSION
          script: |
            set -euo pipefail
            kubectl apply -f "$DEPLOY_DIR/k8s-prod.yaml"
            # Fails the job (non-zero) if the new pods never go Ready — old pods keep serving
            # (maxUnavailable: 0), so a broken image never takes traffic.
            kubectl -n osparty rollout status deployment/osparty-api --timeout=300s
            echo "Deployed osparty-api ${VERSION} to namespace osparty"

  release:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag this commit as v${{ needs.build.outputs.version }}
        id: tag
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists (redeploy of an existing version) — skipping tag + release."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v${VERSION}" "${GITHUB_SHA}"
            git push origin "v${VERSION}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          generate_release_notes: true
