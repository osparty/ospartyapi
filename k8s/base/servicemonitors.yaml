apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: osparty-api
  labels:
    app: osparty-api
spec:
  selector:
    matchLabels:
      app: osparty-api
  endpoints:
    - port: management
      path: /actuator/prometheus
      interval: 15s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis
  labels:
    app: redis
spec:
  selector:
    matchLabels:
      app: redis
  endpoints:
    - port: metrics
      interval: 15s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
