# Paste into the api.osparty.net Proxy Host -> Advanced tab (Custom Nginx Configuration).
# Overrides the forward so it targets the load-balanced pool (upstream osparty_api, defined in
# http_top.conf) and re-asserts the WebSocket + forwarded-header directives the pool needs.
#
# Set up the Proxy Host normally first (Forward -> 10.0.0.2 : 8080, Websockets Support ON, request the
# Let's Encrypt cert), then add this. If your NPM version rejects a duplicate `location /`, define the
# same block under the Proxy Host's "Custom locations" tab instead (path /). Validate with nginx -t.

location / {
    proxy_pass http://osparty_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;      # WebSocket upgrade
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 90s;                            # > the plugin's 20s WS ping
    proxy_next_upstream error timeout http_502 http_503;
}
