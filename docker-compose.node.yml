# PROD — worker NODE (4GB/2vCPU). Runs ONLY an API instance; no Redis, no monitoring, no bot. It reaches
# the shared Redis and the discord-bot on the MAIN server over the private network.
#
# Requires a .env next to this file with: MAIN_PRIVATE_IP, NODE_PRIVATE_IP, REDIS_PASSWORD,
# DISCORD_INTERNAL_TOKEN, and the OAuth vars (see .env.node.example). IMAGE_TAG is exported by the deploy.
services:
  api:
    image: ghcr.io/osparty/osparty-api:${IMAGE_TAG:-latest}
    environment:
      # Shared Redis + bot live on MAIN, reached over the private network.
      SPRING_DATA_REDIS_HOST: "${MAIN_PRIVATE_IP}"
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      DISCORD_SERVICE_URL: "http://${MAIN_PRIVATE_IP}:8090"
      DISCORD_INTERNAL_TOKEN: "${DISCORD_INTERNAL_TOKEN:-}"
      # OAuth2 linking — the NPM upstream may route a callback here, so nodes need the same values as MAIN.
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID:-}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET:-}"
      DISCORD_REDIRECT_URI: "${DISCORD_REDIRECT_URI:-}"
    # Bind BOTH ports to this node's PRIVATE interface only — nothing on this box is public. NPM on MAIN
    # load-balances to :8080 over the private net; Prometheus on MAIN scrapes the metrics port :9090.
    ports:
      - target: 8080
        published: 8080
        host_ip: "${NODE_PRIVATE_IP}"
      - target: 9090
        published: 9090
        host_ip: "${NODE_PRIVATE_IP}"
    # Each WebSocket client is a file descriptor — raise the limit so this instance can hold its share of
    # the fleet's sockets (the default ~1024 caps throughput far below the app's max-connections: 20000).
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    sysctls:
      # Bigger accept backlog for connection/reconnect bursts (pairs with Tomcat's accept-count).
      net.core.somaxconn: "65535"
    restart: unless-stopped

  # Host metrics for this node — published on the private IP so MAIN's Prometheus can scrape it.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - target: 9100
        published: 9100
        host_ip: "${NODE_PRIVATE_IP}"
    restart: unless-stopped

  # Per-container metrics for this node — published on the private IP (cadvisor's internal 8080 -> 9200,
  # since the api already uses 8080). Optional: drop this service if the node is resource-constrained.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    command:
      - '--housekeeping_interval=15s'
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      # Explicit docker socket so cadvisor can resolve container NAMES (see the main compose note).
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - target: 8080
        published: 9200
        host_ip: "${NODE_PRIVATE_IP}"
    restart: unless-stopped
