server:
  port: 8080
  tomcat:
    # Sized for ~10k concurrent WebSocket clients with headroom. Idle NIO sockets do not hold a
    # worker thread, but a redeploy reconnect storm bursts subscribe/host work, so the pool and the
    # accept backlog must absorb it rather than refuse connections.
    max-connections: 20000
    accept-count: 2000
    threads:
      max: 800
      min-spare: 50

spring:
  application:
    name: osrs-party-api
  jackson:
    default-property-inclusion: always
  data:
    redis:
      host: localhost
      port: 6379
      # password: ...

app:
  ads:
    # Ad TTL (ms): an ad is reaped if its host stops keeping it alive within this
    # window. The open WebSocket refreshes it (see app.ws.touch-interval-ms). Redis
    # evicts it natively when the TTL lapses.
    ttl-ms: 90000
  ws:
    # Live party-list push over WebSocket (/api/v1/ws/parties). This is the only
    # transport; disabling it leaves clients with no discovery or hosting path.
    enabled: true
    # How often the server diffs the ad set and pushes changes to subscribers (ms).
    # This is the worst-case latency for a new/updated/removed party to reach clients.
    reconcile-interval-ms: 5000
    # How often a hosting socket refreshes its ad's TTL (socket-as-heartbeat). Must be
    # comfortably below app.ads.ttl-ms; the gap between them is the disconnect grace.
    touch-interval-ms: 5000
  discord:
    # Level-1 voice-channel provisioning. Off by default: with no bot token the app (and the
    # whole test suite) runs a no-op VoiceChannelService. Turn on in the deployed backend only.
    enabled: ${DISCORD_ENABLED:false}
    # Bot token — inject from the environment/secret store, NEVER commit it.
    token: ${DISCORD_TOKEN:}
    # The single guild the bot operates in, and the category new party channels are created under
    # (0 = create at the guild root). Both are Discord snowflake ids.
    guild-id: ${DISCORD_GUILD_ID:0}
    category-id: ${DISCORD_CATEGORY_ID:0}
    # Invite lifetime and cap. maxAge in seconds (default 24h); maxUses 0 = unlimited.
    invite-max-age-seconds: ${DISCORD_INVITE_MAX_AGE_SECONDS:86400}
    invite-max-uses: ${DISCORD_INVITE_MAX_USES:0}

logging:
  level:
    # One INFO line per request (method, path, IP, status, latency).
    net.osparty.api.requests: INFO
    # Flip to DEBUG to also log request bodies (the PartyRequest JSON):
    # net.osparty.api.requests: DEBUG
    # WebSocket: connect/subscribe/close log at INFO; flip to DEBUG to log every
    # frame pushed on each live connection (the full snapshot/delta JSON):
    # net.osparty.api.web.ws.PartyBroadcaster: DEBUG
