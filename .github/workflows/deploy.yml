name: Deploy API

# Versioned, tag-driven GHCR deploy across the fleet. Pushing a semver tag (e.g. v1.2.3) builds the image
# ONCE, pushes it to ghcr.io/osparty/osparty-api, then rolls it out to MAIN + the two worker nodes:
# each host pulls the same immutable tag. A workflow_dispatch run deploys on demand.
#
#   MAIN   (docker-compose.main.yml) — redis + prometheus + grafana + redis-exporter + api #1
#   NODE-A (docker-compose.node.yml) — api only, points at MAIN's private Redis + bot
#   NODE-B (docker-compose.node.yml) — api only
#
# Required repository/org secrets:
#   API_SERVER_ADDRESS   - MAIN server host/IP to SSH into
#   NODE_A_ADDRESS       - worker node A host/IP
#   NODE_B_ADDRESS       - worker node B host/IP
#   SSH_USER, SSH_KEY    - SSH user + private key (PEM, no passphrase); same on all three hosts
#   GHCR_USERNAME, GHCR_TOKEN - GitHub username + PAT (read:packages) for the servers' pull login
# Optional:
#   SSH_PORT             - SSH port (defaults to 22)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for a manual deploy (default: <gradle version>-<sha>)'
        required: false

permissions:
  contents: write   # create the GitHub release
  packages: write   # push the image to GHCR

concurrency:
  group: deploy-api
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/osparty/osparty-api
  DEPLOY_DIR: osparty-api      # directory on each server, under the SSH user's home

jobs:
  # ---- Build + push the image once ---------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            BASE=$(sed -nE "s/.*findProperty\('appVersion'\) \?: '([^']+)'.*/\1/p" build.gradle | head -1)
            VERSION="${BASE:-0.0.0}-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build and test
        run: ./gradlew --no-daemon clean test bootJar -PappVersion=${{ steps.version.outputs.version }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest

  # ---- Roll the new tag out to every host, one at a time -----------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Map this host's address secret into an env var: the `secrets` context is NOT allowed in step `if:`
    # conditions (only `env` is), so this is how a host with no configured address skips cleanly.
    env:
      HOST: ${{ secrets[matrix.host] }}
    strategy:
      fail-fast: false
      max-parallel: 1   # rolling: one host at a time, so the fleet never all-bounces at once
      matrix:
        include:
          - role: main
            host: API_SERVER_ADDRESS
            compose: docker-compose.main.yml
          - role: node
            host: NODE_A_ADDRESS
            compose: docker-compose.node.yml
          - role: node
            host: NODE_B_ADDRESS
            compose: docker-compose.node.yml
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Render NPM upstream from configured nodes (MAIN only)
        # The pool = MAIN + any node whose address secret is set. No hand-editing, no `down` markers:
        # a node joins the LB automatically once its NODE_*_ADDRESS secret exists. Overwrites the
        # committed default before the scp step ships it; the deploy then reloads nginx.
        if: ${{ matrix.role == 'main' && env.HOST != '' }}
        env:
          NODE_A: ${{ secrets.NODE_A_ADDRESS }}
          NODE_B: ${{ secrets.NODE_B_ADDRESS }}
        run: |
          {
            echo "# AUTO-GENERATED by deploy.yml from the NODE_*_ADDRESS secrets — do not hand-edit."
            echo "upstream osparty_api {"
            echo "    least_conn;"
            echo "    server 10.0.0.2:8080 max_fails=3 fail_timeout=15s;   # MAIN (api #1)"
            [ -n "$NODE_A" ] && echo "    server 10.0.0.3:8080 max_fails=3 fail_timeout=15s;   # node-1"
            [ -n "$NODE_B" ] && echo "    server 10.0.0.4:8080 max_fails=3 fail_timeout=15s;   # node-2"
            echo "    keepalive 32;"
            echo "}"
          } > deploy/npm/http_top.conf
          echo "Rendered upstream:"; cat deploy/npm/http_top.conf

      - name: Copy compose to ${{ matrix.role }} (${{ matrix.host }})
        # Skip a host whose address secret isn't set yet, so you can deploy MAIN before the nodes exist;
        # each node lights up automatically once you add its NODE_*_ADDRESS secret.
        if: ${{ env.HOST != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: ${{ matrix.compose }}
          target: ${{ env.DEPLOY_DIR }}
          overwrite: true

      - name: Copy monitoring + NPM config (MAIN only)
        if: ${{ matrix.role == 'main' && env.HOST != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          # monitoring/ = prometheus + grafana config; deploy/npm/http_top.conf = the LB upstream NPM mounts.
          source: "monitoring/**,deploy/npm/http_top.conf"
          target: ${{ env.DEPLOY_DIR }}
          overwrite: true

      - name: Deploy on ${{ matrix.role }}
        if: ${{ env.HOST != '' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.version }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          COMPOSE_FILE: ${{ matrix.compose }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: IMAGE_TAG,DEPLOY_DIR,COMPOSE_FILE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd "$DEPLOY_DIR"

            # Authenticate to GHCR (internal package) so the pull works, incl. on a fresh node.
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            # COMPOSE_FILE selects main vs node compose. Pull the exact tag and (re)start; on MAIN the
            # shared services keep running and only the api container is recreated.
            export IMAGE_TAG COMPOSE_FILE
            docker compose pull
            docker compose up -d

            # On MAIN, reload NPM so upstream changes in http_top.conf (bind-mounted, so `up` won't pick
            # them up) take effect — e.g. after un-`down`ing a node. Best-effort: keep the running config
            # if the new one is invalid or NPM isn't up yet.
            if [ "$COMPOSE_FILE" = "docker-compose.main.yml" ]; then
              docker compose exec -T npm nginx -t \
                && docker compose exec -T npm nginx -s reload \
                && echo "Reloaded NPM" \
                || echo "NPM reload skipped (not ready or config invalid)"
            fi

            docker image prune -f >/dev/null 2>&1 || true
            echo "Deployed osparty-api ${IMAGE_TAG} to ${COMPOSE_FILE}"

  # ---- Cut the GitHub release once, after the rollout --------------------------------------------
  release:
    needs: [build, deploy]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
